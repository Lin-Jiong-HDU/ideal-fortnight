# GEO 优化平台 Nginx 配置
# 将此文件复制到 /etc/nginx/sites-available/geo-platform
# 然后创建软链接: sudo ln -s /etc/nginx/sites-available/geo-platform /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名

    # 静态文件根目录 - 指向 out 目录
    root /var/www/geo-platform/out;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # 主页面路由
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Next.js 静态资源
    location /_next/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理 - 转发到后端服务
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;  # 替换为你的后端地址
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 如果后端直接在根路径（不是 /api）
    # 取消注释以下配置并注释上面的 /api/ location
    # location /login {
    #     proxy_pass http://127.0.0.1:8080/login;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }
    # location /tickets {
    #     proxy_pass http://127.0.0.1:8080/tickets;
    #     # ... 同上
    # }
    # # 其他 API 路由...
}


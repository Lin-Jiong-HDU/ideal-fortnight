# GEO 优化平台 Nginx 配置
# 将此文件复制到 /etc/nginx/sites-available/geo-platform
# 然后创建软链接: sudo ln -s /etc/nginx/sites-available/geo-platform /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名

    # 静态文件根目录 - 指向 out 目录
    root /var/www/geo-platform/out;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # API 反向代理 - 前端请求 /api/* 转发到后端
    location /api/ {
        # 去掉 /api 前缀，转发到后端
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 如果后端需要 WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 前端静态文件路由 - 放在最后作为 fallback
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Next.js 静态资源缓存
    location /_next/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}


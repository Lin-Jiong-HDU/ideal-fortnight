# GEO 优化平台 Nginx 配置
# 将此文件复制到 /etc/nginx/sites-available/geo-platform
# 然后创建软链接: sudo ln -s /etc/nginx/sites-available/geo-platform /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名

    # 静态文件根目录 - 指向 out 目录
    root /var/www/geo-platform/out;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # API 反向代理 - 前端请求 /api/* 转发到后端
    location /api/ {
        # 去掉 /api 前缀，转发到后端
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # === Nginx 处理 CORS ===
        # 允许的域名（替换为你的前端域名）
        set $cors_origin "";
        if ($http_origin ~* "^https?://(www\.)?your-domain\.com$") {
            set $cors_origin $http_origin;
        }
        # 如果使用内网访问，可以添加内网 IP
        if ($http_origin ~* "^https?://192\.168\.") {
            set $cors_origin $http_origin;
        }

        # 添加 CORS 头
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # 预检请求直接返回
        if ($request_method = "OPTIONS") {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # 前端静态文件路由 - 放在最后作为 fallback
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Next.js 静态资源缓存
    location /_next/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
